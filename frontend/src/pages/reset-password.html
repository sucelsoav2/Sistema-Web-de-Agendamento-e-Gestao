<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redefinir senha - AgendaFlow</title>
    <link rel="stylesheet" href="../styles/global.css" />
    <link rel="stylesheet" href="../styles/login.css" />
    <script defer src="https://unpkg.com/lucide@latest"></script>
    <script defer src="../services/uiEnhancements.js"></script>
  </head>
  <body>
    <div class="auth-page">
      <section class="auth-visual" aria-label="Redefinição de senha">
        <div class="auth-visual-content">
          <span class="eyebrow">Segurança</span>
          <h1>Crie uma nova senha para acessar sua agenda.</h1>
          <p>Use uma senha com pelo menos 6 caracteres e guarde-a em um local seguro.</p>
        </div>
      </section>

      <section class="auth-form-panel" aria-label="Formulário de redefinição de senha">
        <div class="auth-card">
          <div class="auth-header">
            <h2>Redefinir senha</h2>
            <p>Informe e confirme sua nova senha.</p>
          </div>

          <form id="resetPasswordForm">
            <label for="novaSenha">Nova senha</label>
            <input type="password" id="novaSenha" placeholder="Digite a nova senha" required />

            <label for="confirmarNovaSenha">Confirmar nova senha</label>
            <input type="password" id="confirmarNovaSenha" placeholder="Repita a nova senha" required />

            <span id="resetMessage" class="success-message"></span>
            <span id="resetError" class="error"></span>
            <button type="submit" class="btn-primary">Salvar nova senha</button>
          </form>

          <div class="auth-footer">
            <p><a href="./login.html">Voltar para o login</a></p>
          </div>
        </div>
      </section>
    </div>

    <script src="../services/authService.js"></script>
    <script src="./reset-password.js"></script>
  </body>
</html>
